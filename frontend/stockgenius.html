const TR={zh:{st:'美股',sp:'搜索代码...',go:'🚀 开始分析',lo:'⏳ KOPI AI 分析中... 6 维度 + SEC 财务',bw:'实时分析',wait:'待分析'},en:{st:'Stocks',sp:'Search...',go:'🚀 Start Analysis',lo:'⏳ KOPI AI analyzing... 6 dimensions + SEC',bw:'Live',wait:'Select stock'}};

let ln='zh',cur='AAPL',ch=null,analyzing=false;
let cikCache={};

function $(id){return document.getElementById(id)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}
function t(k){return TR[ln][k]||k}

function sl(l){
  ln=l;
  $('lbzh').className='lang-btn'+(l==='zh'?' active':'');
  $('lben').className='lang-btn'+(l==='en'?' active':'');
  rd($('sInp').value);
  $('stTitle').textContent=t('st');
  $('goBtn').textContent=t('go');
  $('loadTxt').textContent=t('lo');
  $('sInp').placeholder=t('sp');
}

function rd(f){
  const el=$('sList'),q=f.toUpperCase();
  const fl=q?SS.filter(s=>s.includes(q)||(NN[ln][s]||'').toUpperCase().includes(q)):SS;
  $('stCnt').textContent=fl.length;
  if(!fl.length){el.innerHTML='<div style="padding:16px;text-align:center;color:#B8A080;font-size:11px">—</div>';return}
  el.innerHTML=fl.map(s=>`<div class="si ${s===cur?'on':''}" onclick="pk('${s}')"><span>${s} <span style="color:#B8A080;font-size:10px">${NN[ln][s]||''}</span></span></div>`).join('');
}

function pk(t){
  cur=t;
  rd($('sInp').value);
  upCh(t);
  $('cnt').style.display='none';
  $('goBtn').style.display='block';
  $('tickD').innerHTML=t+' <small id="nameD">'+NN[ln][t]||''+'</small>';
  $('timeD').textContent='';
  $('sigT').textContent=ln==='zh'?'➡️ 待分析':'➡️ Ready';
  $('sigT').className='tag tg-mid';
  // Pre-fetch SEC data on stock select
  fetchSEC(t);
}

function upCh(t){
  $('tv').innerHTML='';
  if(typeof TradingView==='undefined'){$('tv').innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#B8A080;font-size:13px">⏳ Loading…</div>';return setTimeout(()=>upCh(t),1000)}
  ch=new TradingView.widget({container_id:'tv',autosize:true,symbol:t,interval:'D',timezone:'America/New_York',theme:'Light',style:'1',locale:ln==='zh'?'zh_CN':'en',toolbar_bg:'#fff',enable_publishing:false,hide_top_toolbar:false,hide_legend:false,save_image:false,allow_symbol_change:false,studies:[],disabled_features:['use_localstorage_for_settings','header_symbol_change'],overrides:{'paneProperties.background':'#fff','paneProperties.vertGridProperties.color':'#F5F0E8','paneProperties.horzGridProperties.color':'#F5F0E8','symbolWatermarkProperties.transparency':90,'scalesProperties.textColor':'#B8A080','mainSeriesProperties.candleStyle.upColor':'#22c55e','mainSeriesProperties.candleStyle.downColor':'#ef4444'}});
}

function fmtB(n){if(!n||isNaN(n))return null;if(Math.abs(n)>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(Math.abs(n)>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(Math.abs(n)>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString()}
function fmtBS(n){if(!n||isNaN(n))return null;if(Math.abs(n)>=1e12)return(n/1e12).toFixed(2)+'T';if(Math.abs(n)>=1e9)return(n/1e9).toFixed(2)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(2)+'M';return n.toLocaleString()}

// ── SEC EDGAR API ──
async function loadCIKCache(){
  if(Object.keys(cikCache).length>0)return;
  try{
    const r=await fetch('https://www.sec.gov/files/company_tickers.json',{headers:{'User-Agent':'KOPI AI StockGenius/1.0 (contact@kopiaiagent.com)'}});
    const d=await r.json();
    for(const[k,v]of Object.entries(d)){
      cikCache[v.ticker]=String(v.cik_str).padStart(10,'0');
    }
  }catch(e){console.warn('CIK cache load failed:',e.message)}
}

async function getCIK(ticker){
  await loadCIKCache();
  // Check cache
  if(cikCache[ticker])return cikCache[ticker];
  // Hardcoded fallbacks for known tickers
  const fb={SPCX:'0001181412',RKLB:'0001817359',LUNR:'0001848701',ASTS:'0001772784',COIN:'0001679788',PLTR:'0001321655',SMCI:'0001375365',HOOD:'0001839408',AFRM:'0001792789',ARM:'0001936171',HIMS:'0001784121',RIVN:'0001869239',ENPH:'0001463101',FSLR:'0001272508',DKNG:'0001880613',ROKU:'0001428439',SNOW:'0001640147',DDOG:'0001569355',NET:'0001477333',ZS:'0001713683',MDB:'0001441816',TEAM:'0001650372',WDAY:'0001327811'};
  return fb[ticker]||null;
}

async function fetchSEC(ticker){
  const cik=await getCIK(ticker);
  if(!cik){showSEC(null);return}
  try{
    const r=await fetch(`https://data.sec.gov/api/xbrl/companyfacts/CIK${cik}.json`,{headers:{'User-Agent':'KOPI AI StockGenius/1.0 (contact@kopiaiagent.com)'}});
    const d=await r.json();
    const gaap=d.facts?.['us-gaap']||{};

    // Find latest 10-K annual data
    function getLatest(metric,unit='USD'){
      const arr=gaap[metric]?.units?.[unit]||[];
      const annuals=arr.filter(e=>e.form==='10-K').sort((a,b)=>b.fy-a.fy);
      if(annuals.length)return annuals[0];
      const qtrs=arr.filter(e=>e.form==='10-Q').sort((a,b)=>b.fy-b.fy||(b.fp||'').localeCompare(a.fp||''));
      return qtrs[0]||arr[0]||null;
    }

    const rev=getLatest('Revenues')||getLatest('RevenueFromContractWithCustomerExcludingAssessedTax');
    const ni=getLatest('NetIncomeLoss');
    const eps=getLatest('EarningsPerShareDiluted','USD/shares');
    const assets=getLatest('Assets');
    const cash=getLatest('CashAndCashEquivalentsAtCarryingValue');
    const equity=getLatest('StockholdersEquity');
    const ocf=getLatest('NetCashProvidedByUsedInOperatingActivities');

    if(rev||ni||eps){
      const data={
        revenue:rev?.val,
        netIncome:ni?.val,
        eps:eps?.val,
        assets:assets?.val,
        cash:cash?.val,
        equity:equity?.val,
        ocf:ocf?.val,
        period:rev?.fy?`FY${rev.fy}`:(ni?.fy?`FY${ni.fy}`:'')
      };
      showSEC(data);
    }else{showSEC(null)}
  }catch(e){console.warn('SEC fetch error:',e.message);showSEC(null)}
}

function showSEC(d){
  const card=$('secFinCard'),grid=$('finGrid'),period=$('secPeriod'),src=$('secSrc');
  if(!d||(!d.revenue&&!d.netIncome&&!d.eps)){
    // Try to extract from backend financial text
    const ft=$('dFin').textContent||'';
    const revM=ft.match(/收入[为：:]\s*\$?([\d,.]+[TBM]?)/);
    const niM=ft.match(/净利润[为：:达]?\s*\$?([\d,.]+[TBM]?)/);
    const epsM=ft.match(/EPS[为：:]\s*\$?([\d,.]+)/);
    if(!revM&&!niM&&!epsM){card.style.display='none';return}
    const items=[];
    if(revM)items.push({l:'营收',v:revM[1]});
    if(niM)items.push({l:'净利润',v:niM[1]});
    if(epsM)items.push({l:'EPS',v:'$'+epsM[1]});
    card.style.display='block';
    period.textContent='';
    src.textContent='数据来源: SEC EDGAR (后端分析)';
    grid.innerHTML=items.map(x=>`<div class="fin-cell"><div class="fv">${x.v}</div><div class="fl">${x.l}</div></div>`).join('');
    return;
  }
  card.style.display='block';
  period.textContent=d.period?' · '+d.period:'';
  src.textContent='数据来源: SEC EDGAR XBRL';
  const items=[
    {l:'营收',v:fmtB(d.revenue)},
    {l:'净利润',v:fmtB(d.netIncome)},
    {l:'EPS',v:d.eps?'$'+d.eps.toFixed(2):null},
    {l:'总资产',v:fmtB(d.assets)},
    {l:'现金',v:fmtB(d.cash)},
    {l:'股东权益',v:fmtB(d.equity)},
    {l:'经营现金流',v:fmtB(d.ocf)},
    {l:'ROE',v:(d.netIncome&&d.equity)?(d.netIncome/d.equity*100).toFixed(1)+'%':null}
  ].filter(x=>x.v);
  grid.innerHTML=items.map(x=>`<div class="fin-cell"><div class="fv">${x.v}</div><div class="fl">${x.l}</div></div>`).join('');
}

async function start(){
  if(analyzing)return;
  analyzing=true;
  const btn=$('goBtn');
  btn.style.display='none';
  $('lod').classList.add('on');
  $('cnt').style.display='none';
  // Fetch SEC data in parallel
  fetchSEC(cur);
  try{
    const r=await fetch('/api/stock/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:cur,lang:ln})});
    const d=await r.json();
    if(!r.ok)throw new Error(d.error||'API error');
    const n=NN[ln][cur]||cur;
    $('tickD').innerHTML=cur+' <small>'+n+'</small>';
    if(d.price)$('priceD').textContent='💲 '+d.price+(d.change?' · '+d.change:'');
    $('timeD').textContent='📅 '+new Date().toLocaleString();
    const sig=ln==='zh'?(d.signal||'震荡'):(d.signal||'neutral');
    const st=$('sigT');
    if(sig.includes('涨')||sig.includes('bull')){st.textContent='📈 '+sig;st.className='tag tg-up'}
    else if(sig.includes('跌')||sig.includes('bear')){st.textContent='📉 '+sig;st.className='tag tg-dn'}
    else{st.textContent='➡️ '+sig;st.className='tag tg-mid'}
    $('dTech').textContent=d.technical||'-';
    $('dNews').textContent=d.news||'-';
    $('dSoc').textContent=d.social||'-';
    $('dFin').textContent=d.financial||'-';
    $('dFnd').textContent=d.founder||'-';
    $('dFnds').textContent=d.funds||'-';
    $('dMacro').textContent=d.macro||'-';
    $('dOpts').textContent=d.options||'-';
    // Show SEC card from parsed backend financial data
    showSEC(null);
    const nb=$('newsBar');
    if(d.news_headlines&&d.news_headlines.length){
      nb.style.display='block';
      nb.innerHTML='<div style="font-size:10px;font-weight:600;color:#C9A84C;margin-bottom:4px">📡 LIVE 实时新闻</div>'+
        d.news_headlines.map(h=>'<div style="font-size:10px;color:#4A3728;padding:3px 0;border-bottom:1px solid #F0E8D8">📰 '+esc(h)+'</div>').join('');
    }else{nb.style.display='none'}
    $('lod').classList.remove('on');
    $('cnt').style.display='block';
    $('sTx').textContent=d.strategy||'-';
    document.querySelectorAll('.tw').forEach(el=>el.classList.add('td'));
  }catch(e){
    $('lod').classList.remove('on');
    $('cnt').style.display='block';
    $('tickD').innerHTML=cur+' <small>—</small>';
    $('sTx').textContent='⚠️ '+(e.message||'分析失败');
    document.querySelectorAll('.tw').forEach(el=>el.classList.add('td'));
  }
  analyzing=false;
}

upCh('AAPL');
$('tickD').innerHTML='AAPL <small>苹果</small>';
$('stCnt').textContent=SS.length;
</script>
